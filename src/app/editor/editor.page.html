<div class="editor-root" (click)="editor.closeContextMenu()">
  <div class="storage-warning" *ngIf="projectService.savingWarning">{{ projectService.savingWarning }}</div>

  <app-editor-header />

  <!-- ── Body ── -->
  <div class="editor-body">

    <app-tool-palette />

    <!-- Canvas viewport -->
    <app-canvas-workspace #workspace class="view-port">
      <svg #canvas display *ngIf="editor.selectedSVG"></svg>
      <app-canvas-guides *ngIf="editor.selectedSVG && animation.mode == 'edit'" [canvas]="canvas?.nativeElement" [workspace]="workspace" />
      <div class="canvas-empty" *ngIf="!editor.selectedSVG">
        <div class="empty-hint">
          <fa-icon icon="plus"></fa-icon>
          <span>Click <strong>New</strong> to start drawing</span>
        </div>
      </div>
    </app-canvas-workspace>

    <!-- Right attribute panel -->
    <div class="attribute-panel" *ngIf="animation.mode == 'edit'">
      <app-properties-panel />

      <app-layers-panel />
    </div>

  </div>

  <animation-timeline
    *ngIf="editor.selectedSVG && animation.mode == 'animate'"
    (animationChange)="handleTimelineChange()"></animation-timeline>

  <app-new-project-dialog />
  <app-export-dialog />
  <app-editor-context-menu />

</div>
