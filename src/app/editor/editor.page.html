<div class="editor-root" (click)="editor.closeContextMenu()">

  <!-- ── Top bar ── -->
  <div class="header">
    <div class="function-bar">
      <button class="btn-new" (click)="openNewDialog()">
        <fa-icon icon="plus"></fa-icon>
        <span>New</span>
      </button>
      <div class="function-bar-sep"></div>
      <button class="btn-icon" (click)="history.undo(editor)" [disabled]="!history.canUndo" title="Undo (Ctrl+Z)">
        <fa-icon icon="rotate-left"></fa-icon>
      </button>
      <button class="btn-icon" (click)="history.redo(editor)" [disabled]="!history.canRedo" title="Redo (Ctrl+Y)">
        <fa-icon icon="rotate-right"></fa-icon>
      </button>
      <div class="function-bar-spacer"></div>
      <button class="btn-export" (click)="exportSVG()" [disabled]="!editor.selectedSVG" title="Export SVG">
        <fa-icon icon="download"></fa-icon>
        <span>Export</span>
      </button>
    </div>
    <div class="tabs">
      <div class="svg-tab"
           *ngFor="let svg of editor.svgs"
           [ngClass]="{'selected': editor.selectedSVG == svg}"
           (click)="editor.selectSVG(svg.id)">
        <span class="tab-name">{{ svg.name }}</span>
        <button class="tab-close" (click)="$event.stopPropagation(); editor.closeSVG(svg.id)">
          <fa-icon icon="times"></fa-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Body ── -->
  <div class="editor-body">

    <!-- Left toolbar -->
    <div class="tool-bar">
      <div class="tool"
           *ngFor="let tool of editor.tools"
           (click)="tool.select($event)"
           (contextmenu)="tool.select($event)"
           [ngClass]="{'selected': tool.selected, 'has-children': tool.children.length}">
        <fa-icon *ngIf="tool.icon" [icon]="tool.getIcon"></fa-icon>
        <ng-container *ngIf="tool.showChildren">
          <div class="child-tools">
            <div class="tool"
                 *ngFor="let ctool of tool.children"
                 (click)="ctool.select($event)"
                 (contextmenu)="ctool.select($event)"
                 [ngClass]="{'selected': ctool.selected}">
              <fa-icon *ngIf="ctool.icon" [icon]="ctool.icon"></fa-icon>
            </div>
          </div>
        </ng-container>
      </div>
    </div>

    <!-- Canvas viewport -->
    <div #viewPort class="view-port">
      <svg #canvas display *ngIf="editor.selectedSVG"></svg>
      <div class="canvas-empty" *ngIf="!editor.selectedSVG">
        <div class="empty-hint">
          <fa-icon icon="plus"></fa-icon>
          <span>Click <strong>New</strong> to start drawing</span>
        </div>
      </div>
      <div class="context-menu" *ngIf="editor.contextMenu"
           (mousedown)="$event.stopPropagation()"
           (click)="$event.stopPropagation()"
           (contextmenu)="$event.preventDefault(); $event.stopPropagation()"
           [style.left.px]="editor.contextMenu.x"
           [style.top.px]="editor.contextMenu.y">
        <button class="context-menu-item"
                *ngFor="let item of editor.contextMenu.items"
                (click)="$event.stopPropagation(); runContextMenuItem(item)">
          <span>{{ item.label }}</span>
          <span class="context-menu-shortcut" *ngIf="item.shortcut">{{ item.shortcut }}</span>
        </button>
        <div class="context-menu-info" *ngIf="editor.contextMenu.infoLines?.length">
          <div class="context-menu-info-title" *ngIf="editor.contextMenu.infoTitle">{{ editor.contextMenu.infoTitle }}</div>
          <div class="context-menu-info-line" *ngFor="let line of editor.contextMenu.infoLines">{{ line }}</div>
        </div>
      </div>
    </div>

    <!-- Right attribute panel -->
    <div class="attribute-panel">
      <ng-container *ngIf="editor.inspectedElement">
        <div class="panel-header">Properties</div>
        <div class="transform-section" *ngIf="asShape(editor.inspectedElement) as selectedShape">
          <div class="transform-title">Frame</div>
          <div class="transform-grid">
            <label>
              <span>X</span>
              <input type="number"
                     [ngModel]="shapeFrameValue(selectedShape, 'x')"
                     (ngModelChange)="setShapeFrameValue(selectedShape, 'x', $event)" />
            </label>
            <label>
              <span>Y</span>
              <input type="number"
                     [ngModel]="shapeFrameValue(selectedShape, 'y')"
                     (ngModelChange)="setShapeFrameValue(selectedShape, 'y', $event)" />
            </label>
            <label>
              <span>W</span>
              <input type="number" min="1"
                     [ngModel]="shapeFrameValue(selectedShape, 'width')"
                     (ngModelChange)="setShapeFrameValue(selectedShape, 'width', $event)" />
            </label>
            <label>
              <span>H</span>
              <input type="number" min="1"
                     [ngModel]="shapeFrameValue(selectedShape, 'height')"
                     (ngModelChange)="setShapeFrameValue(selectedShape, 'height', $event)" />
            </label>
          </div>
        </div>
        <div class="transform-section">
          <div class="transform-title">Offset</div>
          <div class="transform-grid">
            <label>
              <span>Offset X</span>
              <input type="number"
                     [ngModel]="transformValue(editor.inspectedElement, 'translateX')"
                     (ngModelChange)="setTransformValue(editor.inspectedElement, 'translateX', $event)" />
            </label>
            <label>
              <span>Offset Y</span>
              <input type="number"
                     [ngModel]="transformValue(editor.inspectedElement, 'translateY')"
                     (ngModelChange)="setTransformValue(editor.inspectedElement, 'translateY', $event)" />
            </label>
            <label>
              <span>Scale X</span>
              <input type="number" step="0.01"
                     [ngModel]="transformValue(editor.inspectedElement, 'scaleX')"
                     (ngModelChange)="setTransformValue(editor.inspectedElement, 'scaleX', $event)" />
            </label>
            <label>
              <span>Scale Y</span>
              <input type="number" step="0.01"
                     [ngModel]="transformValue(editor.inspectedElement, 'scaleY')"
                     (ngModelChange)="setTransformValue(editor.inspectedElement, 'scaleY', $event)" />
            </label>
            <label>
              <span>Rotate</span>
              <input type="number" step="1"
                     [ngModel]="transformValue(editor.inspectedElement, 'rotation')"
                     (ngModelChange)="setTransformValue(editor.inspectedElement, 'rotation', $event)" />
            </label>
            <label>
              <span>Origin X</span>
              <input type="number"
                     [ngModel]="transformValue(editor.inspectedElement, 'originX')"
                     (ngModelChange)="setTransformValue(editor.inspectedElement, 'originX', $event)" />
            </label>
            <label>
              <span>Origin Y</span>
              <input type="number"
                     [ngModel]="transformValue(editor.inspectedElement, 'originY')"
                     (ngModelChange)="setTransformValue(editor.inspectedElement, 'originY', $event)" />
            </label>
          </div>
        </div>
        <div class="attr-list">
          <ng-container *ngFor="let attr of editor.inspectedElement.attributes">
            <div class="attr-row">
              <attr-text   *ngIf="attr.input == 'text'"
                           [(ngModel)]="settingsOf(editor.inspectedElement)[attr.output]"
                           (ngModelChange)="scheduleAttributeSnapshot()"
                           [label]="attr.label"></attr-text>
              <attr-bool   *ngIf="attr.input == 'bool'"
                           [(ngModel)]="settingsOf(editor.inspectedElement)[attr.output]"
                           (ngModelChange)="scheduleAttributeSnapshot()"
                           [label]="attr.label"></attr-bool>
              <color       *ngIf="attr.input == 'color'"
                           [(ngModel)]="settingsOf(editor.inspectedElement)[attr.output]"
                           (ngModelChange)="scheduleAttributeSnapshot()"
                           [label]="attr.label"></color>
              <range       *ngIf="attr.input == 'range'"
                           [(ngModel)]="settingsOf(editor.inspectedElement)[attr.output]"
                           (ngModelChange)="scheduleAttributeSnapshot()"
                           [min]="$any(attr).min" [max]="$any(attr).max"
                           [label]="attr.label"></range>
              <attr-select *ngIf="attr.input == 'select'"
                           [(ngModel)]="settingsOf(editor.inspectedElement)[attr.output]"
                           (ngModelChange)="scheduleAttributeSnapshot()"
                           [options]="$any(attr).options"
                           [label]="attr.label"></attr-select>
            </div>
          </ng-container>
        </div>
      </ng-container>
      <div class="panel-empty" *ngIf="!editor.inspectedElement">
        <fa-icon icon="mouse-pointer"></fa-icon>
        <span>Select an element</span>
      </div>

      <div class="panel-header">Layers</div>
      <div class="layer-list" *ngIf="layerRows.length; else emptyLayers">
        <div class="layer-row"
             *ngFor="let row of layerRows; trackBy: trackLayerRow"
             [attr.data-layer-id]="row.element.id"
             [style.padding-left.px]="12 + (row.depth * 18)"
             [ngClass]="{
               'selected': isLayerSelected(row.element),
               'hidden': !row.element.visible,
               'locked': row.element.locked,
               'dragging': draggingLayer == row.element,
               'clipping-mask': isClippingMask(row.element),
               'drop-before': dragTargetLayer == row.element && dragTargetPosition == 'before',
               'drop-after': dragTargetLayer == row.element && dragTargetPosition == 'after',
               'drop-inside': dragTargetLayer == row.element && dragTargetPosition == 'inside'
             }"
             (click)="selectLayer(row.element, $event)"
             (dblclick)="beginLayerRename($event, row.element)"
             (contextmenu)="openLayerContextMenu($event, row.element)"
             (pointermove)="updateLayerPointerDrag($event)"
             (pointerup)="finishLayerPointerDrag($event)"
             (pointercancel)="cancelLayerPointerDrag($event)">
          <span class="layer-meta">
            <button class="layer-drag-handle"
                    (click)="$event.stopPropagation()"
                    (dblclick)="$event.stopPropagation()"
                    (pointerdown)="beginLayerPointerDrag($event, row.element)"
                    title="Drag layer">
              <fa-icon icon="grip-vertical"></fa-icon>
            </button>
            <button class="layer-expander"
                    *ngIf="asGroup(row.element) as group"
                    (click)="toggleGroupCollapsed($event, group)"
                    [title]="groupIsCollapsed(group) ? 'Expand group' : 'Collapse group'">
              <fa-icon [icon]="groupIsCollapsed(group) ? 'angle-right' : 'angle-down'"></fa-icon>
            </button>
            <span class="layer-expander-placeholder" *ngIf="!asGroup(row.element)"></span>
            <fa-icon [icon]="layerIcon(row.element)"></fa-icon>
            <span class="layer-name" *ngIf="renamingLayer != row.element">{{ row.element.name }}</span>
            <span class="layer-badge" *ngIf="isClippingMask(row.element)">Clip</span>
            <input class="layer-name-input"
                   *ngIf="renamingLayer == row.element"
                   [(ngModel)]="row.element.name"
                   (click)="$event.stopPropagation()"
                   (keydown.enter)="finishLayerRename()"
                   (keydown.escape)="finishLayerRename()"
                   (blur)="finishLayerRename()"
                   maxlength="60"
                   autofocus />
          </span>
          <span class="layer-actions">
            <button class="layer-toggle"
                    (pointerdown)="$event.stopPropagation()"
                    (pointerup)="$event.stopPropagation()"
                    (click)="toggleLayerVisibility($event, row.element)"
                    [title]="row.element.visible ? 'Hide layer' : 'Show layer'">
              <fa-icon [icon]="row.element.visible ? 'eye' : 'eye-slash'"></fa-icon>
            </button>
            <button class="layer-toggle"
                    (pointerdown)="$event.stopPropagation()"
                    (pointerup)="$event.stopPropagation()"
                    (click)="toggleLayerLock($event, row.element)"
                    [title]="row.element.locked ? 'Unlock layer' : 'Lock layer'">
              <fa-icon [icon]="row.element.locked ? 'lock' : 'lock-open'"></fa-icon>
            </button>
            <button class="layer-toggle layer-delete"
                    (pointerdown)="$event.stopPropagation()"
                    (pointerup)="$event.stopPropagation()"
                    (click)="$event.stopPropagation(); deleteLayer(row.element)"
                    title="Delete layer">
              <fa-icon icon="trash"></fa-icon>
            </button>
          </span>
        </div>
      </div>
      <ng-template #emptyLayers>
        <div class="panel-empty layers-empty">
          <fa-icon icon="shapes"></fa-icon>
          <span>No layers yet</span>
        </div>
      </ng-template>
    </div>

  </div>

  <!-- ── New SVG dialog ── -->
  <div class="dialog-overlay" *ngIf="showNewDialog" (click)="cancelNewSVG()">
    <div class="dialog" (click)="$event.stopPropagation()">
      <div class="dialog-header">New Project</div>

      <div class="dialog-body">
        <div class="dialog-field">
          <label>Name</label>
          <input type="text" [(ngModel)]="newName" placeholder="Untitled"
                 (keydown.enter)="confirmNewSVG()" autofocus />
        </div>

        <div class="dialog-row">
          <div class="dialog-field">
            <label>Width</label>
            <div class="input-unit">
              <input type="number" [(ngModel)]="newWidth" min="1" max="8000" />
              <span>px</span>
            </div>
          </div>
          <div class="dialog-field">
            <label>Height</label>
            <div class="input-unit">
              <input type="number" [(ngModel)]="newHeight" min="1" max="8000" />
              <span>px</span>
            </div>
          </div>
        </div>

        <div class="dialog-field">
          <label>Presets</label>
          <div class="preset-grid">
            <button *ngFor="let r of ASPECT_RATIOS"
                    class="preset-btn"
                    [ngClass]="{'active': isAspectSelected(r)}"
                    (click)="pickAspectRatio(r)">
              <span class="preset-size">{{ r.label }}</span>
              <span class="preset-sub">{{ r.sublabel }}</span>
            </button>
          </div>
        </div>
      </div>

      <div class="dialog-footer">
        <button class="btn-cancel" (click)="cancelNewSVG()">Cancel</button>
        <button class="btn-create" (click)="confirmNewSVG()">
          <fa-icon icon="plus"></fa-icon>
          Create
        </button>
      </div>
    </div>
  </div>

  <div class="context-menu" *ngIf="editor.contextMenu"
       (mousedown)="$event.stopPropagation()"
       (click)="$event.stopPropagation()"
       (contextmenu)="$event.preventDefault(); $event.stopPropagation()"
       [style.left.px]="editor.contextMenu.x"
       [style.top.px]="editor.contextMenu.y">
    <button class="context-menu-item"
            *ngFor="let item of editor.contextMenu.items"
            (click)="$event.stopPropagation(); editor.runContextMenuItem(item)">
      <span>{{ item.label }}</span>
      <span class="context-menu-shortcut" *ngIf="item.shortcut">{{ item.shortcut }}</span>
    </button>
    <div class="context-menu-info" *ngIf="editor.contextMenu.infoLines?.length">
      <div class="context-menu-info-title" *ngIf="editor.contextMenu.infoTitle">{{ editor.contextMenu.infoTitle }}</div>
      <div class="context-menu-info-line" *ngFor="let line of editor.contextMenu.infoLines">{{ line }}</div>
    </div>
  </div>

</div>
