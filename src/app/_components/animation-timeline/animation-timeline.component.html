<div class="timeline-root">
  <div class="timeline-resize-handle"
       title="Resize timeline"
       (pointerdown)="timeline.beginResize($event)"
       (pointermove)="timeline.updateResize($event)"
       (pointerup)="timeline.endResize($event)"
       (pointercancel)="timeline.endResize($event)">
    <span></span>
  </div>

  <app-timeline-toolbar />

  <app-timeline-dope-sheet />
</div>
