<div class="timeline-root">
  <div class="timeline-resize-handle"
       title="Resize timeline"
       (pointerdown)="beginResize($event)"
       (pointermove)="updateResize($event)"
       (pointerup)="endResize($event)"
       (pointercancel)="endResize($event)">
    <span></span>
  </div>

  <div class="timeline-toolbar">
    <button class="timeline-icon" (click)="animation.togglePlayback()" [title]="animation.playing ? 'Pause' : 'Play'">
      <fa-icon [icon]="animation.playing ? 'pause' : 'play'"></fa-icon>
    </button>
    <button class="timeline-icon" (click)="animation.stop()" title="Stop">
      <fa-icon icon="stop"></fa-icon>
    </button>
    <label class="timeline-field">
      <span>Time</span>
      <input class="timeline-current-time" type="number" min="0" step="0.01"
             [ngModel]="animation.currentTime"
             (ngModelChange)="animation.seek($event)" />
    </label>
    <label class="timeline-field">
      <span>Duration</span>
      <input type="number" min="0.1" step="0.1"
             [ngModel]="animation.duration"
             (ngModelChange)="setDuration($event)" />
    </label>
    <label class="timeline-check">
      <input type="checkbox"
             [ngModel]="animation.loop"
             (ngModelChange)="setLoop($event)" />
      <span>Loop</span>
    </label>
    <div class="timeline-toolbar-sep"></div>
    <button class="timeline-icon" (click)="zoomTimeline(-20)" title="Zoom out">
      <fa-icon icon="minus"></fa-icon>
    </button>
    <button class="timeline-icon" (click)="fitTimeline()" title="Fit duration">
      <fa-icon icon="arrows-left-right"></fa-icon>
    </button>
    <button class="timeline-icon" (click)="zoomTimeline(20)" title="Zoom in">
      <fa-icon icon="plus"></fa-icon>
    </button>
    <label class="timeline-zoom-field" title="Time zoom in pixels per second">
      <span>Time zoom</span>
      <input type="range" min="10" max="2000" step="10" [ngModel]="pixelsPerSecond" (ngModelChange)="setTimelineZoom($event)" />
      <output>{{ pixelsPerSecond }}</output>
    </label>
    <div class="timeline-toolbar-sep"></div>
    <div class="surface-switch" aria-label="Timeline surface">
      <button class="surface-button" [class.active]="surfaceMode == 'timeline'" (click)="toggleSurfaceMode('timeline')">Timeline</button>
      <button class="surface-button" [class.active]="surfaceMode == 'graph'" (click)="toggleSurfaceMode('graph')">Graph</button>
    </div>
    <ng-container *ngIf="surfaceMode == 'graph'">
      <select class="graph-track-select" [ngModel]="selectedGraphProperty" (ngModelChange)="selectGraphProperty($event)" title="Speed graph property">
        <option *ngFor="let option of graphTrackOptions()" [ngValue]="option.property">{{ option.label }}</option>
      </select>
      <button class="timeline-icon" (click)="fitSpeed()" title="Fit Speed">Fit</button>
      <button class="timeline-icon" (click)="zoomSpeed(1.25)" title="Zoom speed out"><fa-icon icon="minus"></fa-icon></button>
      <button class="timeline-icon" (click)="zoomSpeed(0.8)" title="Zoom speed in"><fa-icon icon="plus"></fa-icon></button>
      <ng-container *ngIf="activeGraphHandle">
        <span class="active-axis-badge" [attr.data-axis]="graphAxis(activeGraphHandle.track.property)">{{ activeHandleAxisLabel() }}</span>
        <label class="timeline-field graph-field"><span>Speed</span><input type="number" step="0.01" [ngModel]="activeHandleSpeed()" (ngModelChange)="setActiveHandleValue('speed', $event)" /></label>
        <label class="timeline-field graph-field"><span>Influence</span><input type="number" min="0" max="1" step="0.01" [ngModel]="activeHandleInfluence()" (ngModelChange)="setActiveHandleValue('influence', $event)" /></label>
        <button class="surface-button" [class.active]="activeHandleLinked()" (click)="relinkActiveHandle()">Link</button>
      </ng-container>
    </ng-container>
    <div class="timeline-toolbar-sep"></div>
    <div class="easing-switch" title="Selected keyframe easing">
      <button class="timeline-icon easing-button"
              *ngFor="let option of easingOptions"
              [disabled]="selectedKeyframeIds.size == 0"
              [ngClass]="{'active': selectedEasingType() == option.type}"
              (click)="setSelectedEasing(option.type)"
              [title]="option.label">
        <fa-icon [icon]="option.icon" [ngClass]="option.className"></fa-icon>
      </button>
    </div>
  </div>

  <div class="timeline-table" (scroll)="updateTimelineViewport($event)" (wheel)="timelineWheel($event)"
       (pointerdown)="beginViewportPan($event)">
    <div class="timeline-head-left">Layers</div>
    <div class="timeline-time-cell timeline-ruler-cell">
      <div class="timeline-time-content timeline-ruler"
           [style.width.px]="timelineContentWidth"
           (pointerdown)="beginScrub($event)">
        <div class="playhead animation-playhead" [attr.data-pixels-per-second]="pixelsPerSecond" [attr.data-time-padding]="timePadding" [style.left]="playheadLeft()"></div>
        <span class="ruler-mark"
              *ngFor="let mark of rulerMarks()"
              [style.left.px]="mark.left">{{ mark.label }}</span>
      </div>
    </div>

    <ng-container *ngIf="virtualTopHeight">
      <div class="timeline-virtual-spacer" [style.height.px]="virtualTopHeight"></div>
      <div class="timeline-virtual-spacer" [style.height.px]="virtualTopHeight"></div>
    </ng-container>

    <ng-container *ngFor="let row of visibleRows; trackBy: trackRow; let visibleIndex = index">
      <div class="timeline-left-cell"
           [ngClass]="{'selected': editor.selectedElement == row.element, 'property': row.type == 'property'}"
           [style.padding-left.px]="10 + row.depth * 16"
           (click)="selectTimelineRow(row)"
           (contextmenu)="openRowContextMenu(row, $event)">
        <button class="row-expander"
                *ngIf="row.type == 'layer'"
                (click)="$event.stopPropagation(); toggleLayer(row.element)">
          <fa-icon [icon]="expandedLayerIds.has(row.element.id) ? 'angle-down' : 'angle-right'"></fa-icon>
        </button>
        <span class="row-expander-placeholder" *ngIf="row.type == 'property'"></span>
        <span class="row-name" *ngIf="row.type == 'layer'">{{ row.element.name }}</span>
        <ng-container *ngIf="row.type == 'property'">
          <span class="row-name">{{ row.property.label }}</span>
          <span class="row-value" *ngIf="row.property.valueType != 'color' && !isGradientStopsRow(row)">{{ propertyDisplayValue(row) }}</span>
          <div class="gradient-stops-control" *ngIf="isGradientStopsRow(row) && gradientForRow(row) as gradient"
               (click)="$event.stopPropagation()" (pointerdown)="$event.stopPropagation()">
            <button class="gradient-stops-trigger" (click)="toggleColorEditor(row, $event)"
                    title="Edit gradient stops" aria-label="Edit gradient stops">
              <span class="gradient-paint-preview" [style.background]="gradientPreview(gradient)"></span>
            </button>
            <div class="gradient-stops-popover" *ngIf="colorEditorOpen(row)" [ngStyle]="paintPopoverStyle()"
                 (click)="$event.stopPropagation()" (pointerdown)="$event.stopPropagation()">
              <div class="gradient-stop-popover-row" *ngFor="let stop of gradient.stops; let stopIndex = index">
                <strong>Stop {{ stopIndex + 1 }}</strong>
                <label>
                  <span>Position</span>
                  <input type="number" min="0" max="1" step="0.01" [ngModel]="stop.offset"
                         (ngModelChange)="setTimelineGradientStop(row, stop, 'offset', $event)" />
                </label>
                <color [ngModel]="stop.color" (ngModelChange)="setTimelineGradientStop(row, stop, 'color', $event)"></color>
              </div>
            </div>
          </div>
          <input class="property-number"
                 *ngIf="row.property.valueType == 'number'"
                 type="number"
                 step="0.01"
                 [ngModel]="propertyValue(row)"
                 (click)="$event.stopPropagation()"
                 (pointerdown)="beginNumberDrag(row, $event)"
                 (ngModelChange)="setPropertyValue(row, $event)" />
          <label class="property-bool" *ngIf="row.property.valueType == 'boolean'">
            <input type="checkbox"
                   [ngModel]="propertyValue(row)"
                   (click)="$event.stopPropagation()"
                   (ngModelChange)="setPropertyValue(row, $event)" />
          </label>
          <div class="property-color"
               *ngIf="row.property.valueType == 'color'"
               (click)="$event.stopPropagation()"
               (pointerdown)="$event.stopPropagation()">
            <button class="color-compact"
                    (click)="toggleColorEditor(row, $event)"
                    title="Edit color">
              <span class="color-swatch" [style.background-color]="colorDisplayValue(row)"></span>
              <span class="color-hex">{{ colorDisplayValue(row) }}</span>
            </button>
            <div class="color-popover"
                 *ngIf="colorEditorOpen(row)"
                 [ngStyle]="paintPopoverStyle()"
                 (click)="$event.stopPropagation()"
                 (pointerdown)="$event.stopPropagation()">
              <color [ngModel]="colorValue(row)"
                     (ngModelChange)="setPropertyValue(row, $event)"></color>
            </div>
          </div>
          <div class="key-controls">
            <button class="key-button"
                    [disabled]="previousKeyframeTime(row) == null"
                    (click)="jumpToKeyframe(row, 'previous', $event)"
                    title="Previous keyframe">
              <fa-icon icon="chevron-left"></fa-icon>
            </button>
            <button class="key-button key-toggle"
                    [ngClass]="{'active': hasKeyAtTime(row)}"
                    (click)="$event.stopPropagation(); toggleKey(row)"
                    [title]="hasKeyAtTime(row) ? 'Remove keyframe' : 'Add keyframe'">
              <fa-icon icon="diamond"></fa-icon>
            </button>
            <button class="key-button"
                    [disabled]="nextKeyframeTime(row) == null"
                    (click)="jumpToKeyframe(row, 'next', $event)"
                    title="Next keyframe">
              <fa-icon icon="chevron-right"></fa-icon>
            </button>
          </div>
        </ng-container>
      </div>

      <div class="timeline-time-cell" *ngIf="surfaceMode == 'timeline'">
        <div class="timeline-time-content timeline-lane"
             [ngClass]="{'property': row.type == 'property'}"
             [style.width.px]="timelineContentWidth"
             [style.--timeline-grid-step]="gridStepWidth()"
             [style.--timeline-grid-offset]="gridOffset()"
             (pointerdown)="beginLaneGesture(row, $event)"
             (pointermove)="updateLaneGesture($event)"
             (pointerup)="endLaneGesture($event)"
             (pointercancel)="endLaneGesture($event)">
          <div class="playhead animation-playhead" [attr.data-pixels-per-second]="pixelsPerSecond" [attr.data-time-padding]="timePadding" [style.left]="playheadLeft()"></div>
          <button class="key-diamond"
                  *ngFor="let keyframe of row.type == 'property' ? visibleKeyframes(row) : []"
                  [attr.data-keyframe-id]="keyframe.id"
                  [attr.data-keyframe-ids]="keyframe.groupedKeyframeIds?.join(',')"
                  [ngClass]="{'selected': isKeyframeSelected(keyframe)}"
                  [style.left]="keyframeLeft(keyframe.time)"
                  (pointerdown)="beginKeyframeDrag(keyframe, $event)"
                  (click)="$event.stopPropagation()"
                  [title]="keyframe.time.toFixed(2) + 's'">
            <fa-icon [icon]="keyframeEasingIcon(keyframe)" [ngClass]="keyframeEasingClass(keyframe)"></fa-icon>
          </button>
          <span class="key-summary-diamond"
                *ngFor="let keyframe of row.type == 'layer' ? visibleKeyframes(row) : []"
                [style.left]="keyframeLeft(keyframe.time)"
                [title]="keyframe.time.toFixed(2) + 's · ' + keyframe.summaryCount + ' keyframe' + (keyframe.summaryCount == 1 ? '' : 's')"
                aria-hidden="true">
            <fa-icon icon="diamond"></fa-icon>
          </span>
        </div>
      </div>
      <div class="timeline-time-cell graph-row-placeholder" *ngIf="surfaceMode == 'graph'">
        <div class="speed-graph-surface" *ngIf="visibleIndex == 0"
             [style.width.px]="timelineContentWidth" [style.height.px]="graphHeight()"
             (pointerdown)="beginScrub($event)">
          <svg [attr.width]="timelineContentWidth" [attr.height]="graphHeight()" [attr.viewBox]="'0 0 ' + timelineContentWidth + ' ' + graphHeight()">
            <line class="speed-zero-line" [attr.x1]="0" [attr.x2]="timelineContentWidth" [attr.y1]="graphZeroY()" [attr.y2]="graphZeroY()"></line>
            <line class="graph-playhead animation-graph-playhead"
                  [attr.data-pixels-per-second]="pixelsPerSecond" [attr.data-time-padding]="timePadding"
                  [attr.x1]="graphPlayheadX()" [attr.x2]="graphPlayheadX()" y1="0" [attr.y2]="graphHeight()"></line>
            <ng-container *ngFor="let graphTrack of graphRenderTracks()">
              <path class="speed-curve" [attr.d]="speedCurvePath(graphTrack.track)" [attr.stroke]="graphTrack.color"></path>
              <ng-container *ngFor="let handle of graphHandles(graphTrack.track)">
                <circle *ngIf="graphTrack.axis != 'y'" class="speed-key" [class.selected]="graphKeyframeSelected(handle)" [attr.stroke]="graphTrack.color"
                        [attr.cx]="graphKeyX(handle)" [attr.cy]="graphHandleDisplayY(handle)" r="4.5"
                        (pointerdown)="beginGraphKeyframeDrag(handle, $event)">
                  <title>{{ graphTrack.label }} · drag horizontally to retime · {{ handle.keyframe.time.toFixed(2) }}s</title>
                </circle>
                <rect *ngIf="graphTrack.axis == 'y'" class="speed-key speed-key-y" [class.selected]="graphKeyframeSelected(handle)" [attr.stroke]="graphTrack.color"
                      [attr.x]="graphKeyX(handle) - 4.5" [attr.y]="graphHandleDisplayY(handle) - 4.5" width="9" height="9"
                      (pointerdown)="beginGraphKeyframeDrag(handle, $event)">
                  <title>{{ graphTrack.label }} · drag horizontally to retime · {{ handle.keyframe.time.toFixed(2) }}s</title>
                </rect>
                <line class="speed-handle-line"
                      [attr.stroke]="graphTrack.color"
                      [attr.x1]="graphKeyX(handle)" [attr.y1]="graphHandleDisplayY(handle)"
                      [attr.x2]="graphHandleX(handle)" [attr.y2]="graphHandleDisplayY(handle)"></line>
                <circle *ngIf="graphTrack.axis != 'y'" class="speed-handle" [class.selected]="graphHandleSelected(handle)"
                        [attr.stroke]="graphTrack.color" [attr.cx]="graphHandleX(handle)" [attr.cy]="graphHandleDisplayY(handle)" r="5"
                        (pointerdown)="beginGraphHandleDrag(handle, $event)">
                  <title>{{ graphTrack.label }} · {{ handle.side }} · {{ handle.speed.toFixed(2) }} units/s</title>
                </circle>
                <rect *ngIf="graphTrack.axis == 'y'" class="speed-handle speed-handle-y" [class.selected]="graphHandleSelected(handle)"
                      [attr.stroke]="graphTrack.color" [attr.x]="graphHandleX(handle) - 5" [attr.y]="graphHandleDisplayY(handle) - 5" width="10" height="10"
                      (pointerdown)="beginGraphHandleDrag(handle, $event)">
                  <title>{{ graphTrack.label }} · {{ handle.side }} · {{ handle.speed.toFixed(2) }} units/s</title>
                </rect>
              </ng-container>
            </ng-container>
          </svg>
          <div class="graph-legend" *ngIf="graphTracks().length" (pointerdown)="$event.stopPropagation()">
            <button *ngFor="let graphTrack of graphTracks()" [class.active]="graphTrack.selected"
                    (click)="selectGraphProperty(graphTrack.track.property)">
              <span [style.background]="graphTrack.color" [class.square]="graphTrack.axis == 'y'"></span>{{ graphTrack.label }}
            </button>
          </div>
          <div class="speed-axis-label max">{{ graphSpeedMax.toFixed(2) }}</div>
          <div class="speed-axis-label zero">0 units/s</div>
          <div class="speed-axis-label min">{{ graphSpeedMin.toFixed(2) }}</div>
          <div class="graph-empty" *ngIf="graphTracks().length == 0">Select a numeric property with keyframes to edit its speed.</div>
        </div>
      </div>
    </ng-container>

    <ng-container *ngIf="virtualBottomHeight">
      <div class="timeline-virtual-spacer" [style.height.px]="virtualBottomHeight"></div>
      <div class="timeline-virtual-spacer" [style.height.px]="virtualBottomHeight"></div>
    </ng-container>

    <div class="timeline-left-cell timeline-overscroll"
         [style.min-height.px]="overscrollHeight"></div>
    <div class="timeline-time-cell timeline-overscroll"
         [style.min-height.px]="overscrollHeight">
      <div class="timeline-time-content timeline-lane timeline-overscroll"
           [style.width.px]="timelineContentWidth"
           [style.min-height.px]="overscrollHeight"
           [style.--timeline-grid-step]="gridStepWidth()"
           [style.--timeline-grid-offset]="gridOffset()"></div>
    </div>
  </div>

  <div class="marquee-selection" *ngIf="marquee?.active" [ngStyle]="marqueeStyle()"></div>
</div>
