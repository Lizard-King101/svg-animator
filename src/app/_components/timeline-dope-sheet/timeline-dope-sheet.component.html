<div class="timeline-table" *ngIf="timeline.surfaceMode == 'timeline'"
     (scroll)="timeline.updateTimelineViewport($event); timeline.closeColorEditor()" (wheel)="timeline.timelineWheel($event)"
     (pointerdown)="timeline.beginViewportPan($event)">
  <div class="timeline-head-left">Layers</div>
  <div class="timeline-time-cell timeline-ruler-cell">
    <app-timeline-ruler />
  </div>

  <ng-container *ngIf="timeline.virtualTopHeight">
    <div class="timeline-virtual-spacer" [style.height.px]="timeline.virtualTopHeight"></div>
    <div class="timeline-virtual-spacer" [style.height.px]="timeline.virtualTopHeight"></div>
  </ng-container>

  <ng-container *ngFor="let row of timeline.visibleRows; trackBy: timeline.trackRow">
    <app-timeline-row [row]="row" />

    <div class="timeline-time-cell" *ngIf="timeline.surfaceMode == 'timeline'">
      <div class="timeline-time-content timeline-lane"
           [ngClass]="{'property': row.type == 'property'}"
           [style.width.px]="timeline.timelineContentWidth"
           [style.--timeline-grid-step]="timeline.gridStepWidth()"
           [style.--timeline-grid-offset]="timeline.gridOffset()"
           (pointerdown)="timeline.beginLaneGesture(row, $event)"
           (pointermove)="timeline.updateLaneGesture($event)"
           (pointerup)="timeline.endLaneGesture($event)"
           (pointercancel)="timeline.endLaneGesture($event)">
        <div class="playhead animation-playhead" [attr.data-pixels-per-second]="timeline.pixelsPerSecond" [attr.data-time-padding]="timeline.timePadding" [attr.data-domain-start]="timeline.timeDomainStart" [style.left]="timeline.playheadLeft()"></div>
        <button class="key-diamond"
                *ngFor="let keyframe of row.type == 'property' ? timeline.visibleKeyframes(row) : []"
                [attr.data-keyframe-id]="keyframe.id"
                [attr.data-keyframe-ids]="keyframe.groupedKeyframeIds?.join(',')"
                [ngClass]="{'selected': timeline.isKeyframeSelected(keyframe)}"
                [style.left]="timeline.keyframeLeft(keyframe.time)"
                (pointerdown)="timeline.beginKeyframeDrag(keyframe, $event)"
                (click)="$event.stopPropagation()"
                [title]="keyframe.time.toFixed(2) + 's'">
          <fa-icon [icon]="timeline.keyframeEasingIcon(keyframe)"></fa-icon>
        </button>
        <span class="key-summary-diamond"
              *ngFor="let keyframe of row.type == 'layer' ? timeline.visibleKeyframes(row) : []"
              [style.left]="timeline.keyframeLeft(keyframe.time)"
              [title]="keyframe.time.toFixed(2) + 's · ' + keyframe.summaryCount + ' keyframe' + (keyframe.summaryCount == 1 ? '' : 's')"
              aria-hidden="true">
          <fa-icon icon="diamond"></fa-icon>
        </span>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="timeline.virtualBottomHeight">
    <div class="timeline-virtual-spacer" [style.height.px]="timeline.virtualBottomHeight"></div>
    <div class="timeline-virtual-spacer" [style.height.px]="timeline.virtualBottomHeight"></div>
  </ng-container>

  <ng-container *ngIf="timeline.overscrollHeight > 0">
    <div class="timeline-left-cell timeline-overscroll"
         [style.min-height.px]="timeline.overscrollHeight"></div>
    <div class="timeline-time-cell timeline-overscroll"
         [style.min-height.px]="timeline.overscrollHeight">
      <div class="timeline-time-content timeline-lane timeline-overscroll"
           [style.width.px]="timeline.timelineContentWidth"
           [style.min-height.px]="timeline.overscrollHeight"
           [style.--timeline-grid-step]="timeline.gridStepWidth()"
           [style.--timeline-grid-offset]="timeline.gridOffset()"></div>
    </div>
  </ng-container>
</div>

<div class="timeline-graph-layout" *ngIf="timeline.surfaceMode == 'graph'">
  <section class="graph-layer-pane">
    <div class="timeline-head-left">Layers</div>
    <div class="graph-layer-scroll"
         (scroll)="timeline.updateLayerViewport($event); timeline.closeColorEditor()">
      <div class="timeline-virtual-spacer" *ngIf="timeline.virtualTopHeight" [style.height.px]="timeline.virtualTopHeight"></div>
      <app-timeline-row *ngFor="let row of timeline.visibleRows; trackBy: timeline.trackRow" [row]="row" />
      <div class="timeline-virtual-spacer" *ngIf="timeline.virtualBottomHeight" [style.height.px]="timeline.virtualBottomHeight"></div>
      <div class="timeline-left-cell timeline-overscroll" *ngIf="timeline.overscrollHeight > 0"
           [style.min-height.px]="timeline.overscrollHeight"></div>
    </div>
  </section>

  <section class="graph-time-pane timeline-time-cell"
           (scroll)="timeline.updateGraphViewport($event); timeline.closeColorEditor()"
           (wheel)="timeline.timelineWheel($event)"
           (pointerdown)="timeline.beginViewportPan($event)">
    <div class="graph-time-content" [style.width.px]="timeline.timelineContentWidth">
      <div class="timeline-ruler-cell">
        <app-timeline-ruler />
      </div>
      <div class="graph-fixed-placeholder" [style.height.px]="timeline.graphHeight()">
        <app-timeline-graph />
      </div>
    </div>
  </section>
</div>

<div class="marquee-selection" *ngIf="timeline.marquee?.active" [ngStyle]="timeline.marqueeStyle()"></div>
