<div class="timeline-table" (scroll)="timeline.updateTimelineViewport($event)" (wheel)="timeline.timelineWheel($event)"
     (pointerdown)="timeline.beginViewportPan($event)">
  <div class="timeline-head-left">Layers</div>
  <div class="timeline-time-cell timeline-ruler-cell">
    <div class="timeline-time-content timeline-ruler"
         [style.width.px]="timeline.timelineContentWidth"
         (pointerdown)="timeline.beginScrub($event)">
      <div class="playhead animation-playhead" [attr.data-pixels-per-second]="timeline.pixelsPerSecond" [attr.data-time-padding]="timeline.timePadding" [style.left]="timeline.playheadLeft()"></div>
      <span class="ruler-mark"
            *ngFor="let mark of timeline.rulerMarks()"
            [style.left.px]="mark.left">{{ mark.label }}</span>
    </div>
  </div>

  <ng-container *ngIf="timeline.virtualTopHeight">
    <div class="timeline-virtual-spacer" [style.height.px]="timeline.virtualTopHeight"></div>
    <div class="timeline-virtual-spacer" [style.height.px]="timeline.virtualTopHeight"></div>
  </ng-container>

  <ng-container *ngFor="let row of timeline.visibleRows; trackBy: timeline.trackRow; let visibleIndex = index">
    <div class="timeline-left-cell"
         [ngClass]="{'selected': timeline.editor.selectedElement == row.element, 'property': row.type == 'property'}"
         [style.padding-left.px]="10 + row.depth * 16"
         (click)="timeline.selectTimelineRow(row)"
         (contextmenu)="timeline.openRowContextMenu(row, $event)">
      <button class="row-expander"
              *ngIf="row.type == 'layer'"
              (click)="$event.stopPropagation(); timeline.toggleLayer(row.element)">
        <fa-icon [icon]="timeline.expandedLayerIds.has(row.element.id) ? 'angle-down' : 'angle-right'"></fa-icon>
      </button>
      <span class="row-expander-placeholder" *ngIf="row.type == 'property'"></span>
      <span class="row-name" *ngIf="row.type == 'layer'">{{ row.element.name }}</span>
      <ng-container *ngIf="row.type == 'property'">
        <span class="row-name">{{ row.property.label }}</span>
        <span class="row-value" *ngIf="row.property.valueType != 'color' && !timeline.isGradientStopsRow(row)">{{ timeline.propertyDisplayValue(row) }}</span>
        <div class="gradient-stops-control" *ngIf="timeline.isGradientStopsRow(row) && timeline.gradientForRow(row) as gradient"
             (click)="$event.stopPropagation()" (pointerdown)="$event.stopPropagation()">
          <button class="gradient-stops-trigger" (click)="timeline.toggleColorEditor(row, $event)"
                  title="Edit gradient stops" aria-label="Edit gradient stops">
            <span class="gradient-paint-preview" [style.background]="timeline.gradientPreview(gradient)"></span>
          </button>
          <div class="gradient-stops-popover" *ngIf="timeline.colorEditorOpen(row)" [ngStyle]="timeline.paintPopoverStyle()"
               (click)="$event.stopPropagation()" (pointerdown)="$event.stopPropagation()">
            <div class="gradient-stop-popover-row" *ngFor="let stop of gradient.stops; let stopIndex = index">
              <strong>Stop {{ stopIndex + 1 }}</strong>
              <label>
                <span>Position</span>
                <input type="number" min="0" max="1" step="0.01" [ngModel]="stop.offset"
                       (ngModelChange)="timeline.setTimelineGradientStop(row, stop, 'offset', $event)" />
              </label>
              <color [ngModel]="stop.color" (ngModelChange)="timeline.setTimelineGradientStop(row, stop, 'color', $event)"></color>
            </div>
          </div>
        </div>
        <input class="property-number"
               *ngIf="row.property.valueType == 'number'"
               type="number"
               step="0.01"
               [ngModel]="timeline.propertyValue(row)"
               (click)="$event.stopPropagation()"
               (pointerdown)="timeline.beginNumberDrag(row, $event)"
               (ngModelChange)="timeline.setPropertyValue(row, $event)" />
        <label class="property-bool" *ngIf="row.property.valueType == 'boolean'">
          <input type="checkbox"
                 [ngModel]="timeline.propertyValue(row)"
                 (click)="$event.stopPropagation()"
                 (ngModelChange)="timeline.setPropertyValue(row, $event)" />
        </label>
        <div class="property-color"
             *ngIf="row.property.valueType == 'color'"
             (click)="$event.stopPropagation()"
             (pointerdown)="$event.stopPropagation()">
          <button class="color-compact"
                  (click)="timeline.toggleColorEditor(row, $event)"
                  title="Edit color">
            <span class="color-swatch" [style.background-color]="timeline.colorDisplayValue(row)"></span>
            <span class="color-hex">{{ timeline.colorDisplayValue(row) }}</span>
          </button>
          <div class="color-popover"
               *ngIf="timeline.colorEditorOpen(row)"
               [ngStyle]="timeline.paintPopoverStyle()"
               (click)="$event.stopPropagation()"
               (pointerdown)="$event.stopPropagation()">
            <color [ngModel]="timeline.colorValue(row)"
                   (ngModelChange)="timeline.setPropertyValue(row, $event)"></color>
          </div>
        </div>
        <div class="key-controls">
          <button class="key-button"
                  [disabled]="timeline.previousKeyframeTime(row) == null"
                  (click)="timeline.jumpToKeyframe(row, 'previous', $event)"
                  title="Previous keyframe">
            <fa-icon icon="chevron-left"></fa-icon>
          </button>
          <button class="key-button key-toggle"
                  [ngClass]="{'active': timeline.hasKeyAtTime(row)}"
                  (click)="$event.stopPropagation(); timeline.toggleKey(row)"
                  [title]="timeline.hasKeyAtTime(row) ? 'Remove keyframe' : 'Add keyframe'">
            <fa-icon icon="diamond"></fa-icon>
          </button>
          <button class="key-button"
                  [disabled]="timeline.nextKeyframeTime(row) == null"
                  (click)="timeline.jumpToKeyframe(row, 'next', $event)"
                  title="Next keyframe">
            <fa-icon icon="chevron-right"></fa-icon>
          </button>
        </div>
      </ng-container>
    </div>

    <div class="timeline-time-cell" *ngIf="timeline.surfaceMode == 'timeline'">
      <div class="timeline-time-content timeline-lane"
           [ngClass]="{'property': row.type == 'property'}"
           [style.width.px]="timeline.timelineContentWidth"
           [style.--timeline-grid-step]="timeline.gridStepWidth()"
           [style.--timeline-grid-offset]="timeline.gridOffset()"
           (pointerdown)="timeline.beginLaneGesture(row, $event)"
           (pointermove)="timeline.updateLaneGesture($event)"
           (pointerup)="timeline.endLaneGesture($event)"
           (pointercancel)="timeline.endLaneGesture($event)">
        <div class="playhead animation-playhead" [attr.data-pixels-per-second]="timeline.pixelsPerSecond" [attr.data-time-padding]="timeline.timePadding" [style.left]="timeline.playheadLeft()"></div>
        <button class="key-diamond"
                *ngFor="let keyframe of row.type == 'property' ? timeline.visibleKeyframes(row) : []"
                [attr.data-keyframe-id]="keyframe.id"
                [attr.data-keyframe-ids]="keyframe.groupedKeyframeIds?.join(',')"
                [ngClass]="{'selected': timeline.isKeyframeSelected(keyframe)}"
                [style.left]="timeline.keyframeLeft(keyframe.time)"
                (pointerdown)="timeline.beginKeyframeDrag(keyframe, $event)"
                (click)="$event.stopPropagation()"
                [title]="keyframe.time.toFixed(2) + 's'">
          <fa-icon [icon]="timeline.keyframeEasingIcon(keyframe)" [ngClass]="timeline.keyframeEasingClass(keyframe)"></fa-icon>
        </button>
        <span class="key-summary-diamond"
              *ngFor="let keyframe of row.type == 'layer' ? timeline.visibleKeyframes(row) : []"
              [style.left]="timeline.keyframeLeft(keyframe.time)"
              [title]="keyframe.time.toFixed(2) + 's · ' + keyframe.summaryCount + ' keyframe' + (keyframe.summaryCount == 1 ? '' : 's')"
              aria-hidden="true">
          <fa-icon icon="diamond"></fa-icon>
        </span>
      </div>
    </div>
    <div class="timeline-time-cell graph-row-placeholder" *ngIf="timeline.surfaceMode == 'graph'">
        <app-timeline-graph [visibleIndex]="visibleIndex" />
    </div>
  </ng-container>

  <ng-container *ngIf="timeline.virtualBottomHeight">
    <div class="timeline-virtual-spacer" [style.height.px]="timeline.virtualBottomHeight"></div>
    <div class="timeline-virtual-spacer" [style.height.px]="timeline.virtualBottomHeight"></div>
  </ng-container>

  <div class="timeline-left-cell timeline-overscroll"
       [style.min-height.px]="timeline.overscrollHeight"></div>
  <div class="timeline-time-cell timeline-overscroll"
       [style.min-height.px]="timeline.overscrollHeight">
    <div class="timeline-time-content timeline-lane timeline-overscroll"
         [style.width.px]="timeline.timelineContentWidth"
         [style.min-height.px]="timeline.overscrollHeight"
         [style.--timeline-grid-step]="timeline.gridStepWidth()"
         [style.--timeline-grid-offset]="timeline.gridOffset()"></div>
  </div>
</div>

<div class="marquee-selection" *ngIf="timeline.marquee?.active" [ngStyle]="timeline.marqueeStyle()"></div>
