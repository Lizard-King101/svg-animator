<ng-container *ngIf="editor.inspectedElement">
  <div class="panel-header">Properties</div>
  <div class="transform-section" *ngIf="asShape(editor.inspectedElement) as selectedShape">
    <div class="transform-title">Frame</div>
    <div class="transform-grid">
      <label>
        <span>X</span>
        <input type="number"
               [ngModel]="shapeFrameValue(selectedShape, 'x')"
               (ngModelChange)="setShapeFrameValue(selectedShape, 'x', $event)" />
      </label>
      <label>
        <span>Y</span>
        <input type="number"
               [ngModel]="shapeFrameValue(selectedShape, 'y')"
               (ngModelChange)="setShapeFrameValue(selectedShape, 'y', $event)" />
      </label>
      <label>
        <span>W</span>
        <input type="number" min="1"
               [ngModel]="shapeFrameValue(selectedShape, 'width')"
               (ngModelChange)="setShapeFrameValue(selectedShape, 'width', $event)" />
      </label>
      <label>
        <span>H</span>
        <input type="number" min="1"
               [ngModel]="shapeFrameValue(selectedShape, 'height')"
               (ngModelChange)="setShapeFrameValue(selectedShape, 'height', $event)" />
      </label>
    </div>
  </div>
  <div class="transform-section" *ngIf="asPath(editor.inspectedElement) as selectedPath">
    <ng-container *ngIf="selectedCornerAnchor(selectedPath) as anchor">
      <div class="transform-title">Anchor</div>
      <div class="transform-grid">
        <label>
          <span>X</span>
          <input type="number"
                 [ngModel]="anchorPositionValue(anchor, 'x')"
                 (ngModelChange)="setAnchorPositionValue(selectedPath, anchor, 'x', $event)" />
        </label>
        <label>
          <span>Y</span>
          <input type="number"
                 [ngModel]="anchorPositionValue(anchor, 'y')"
                 (ngModelChange)="setAnchorPositionValue(selectedPath, anchor, 'y', $event)" />
        </label>
        <label>
          <span>Corner Radius</span>
          <input type="number"
                 min="0"
                 step="1"
                 [disabled]="!cornerRadiusEnabled(selectedPath, anchor)"
                 [ngModel]="cornerRadiusValue(anchor)"
                 (ngModelChange)="setCornerRadius(selectedPath, anchor, $event)" />
        </label>
      </div>
    </ng-container>
  </div>
  <div class="transform-section">
    <div class="transform-title">Offset</div>
    <div class="transform-grid">
      <label>
        <span>Offset X</span>
        <input type="number"
               [ngModel]="transformValue(editor.inspectedElement, 'translateX')"
               (ngModelChange)="setTransformValue(editor.inspectedElement, 'translateX', $event)" />
      </label>
      <label>
        <span>Offset Y</span>
        <input type="number"
               [ngModel]="transformValue(editor.inspectedElement, 'translateY')"
               (ngModelChange)="setTransformValue(editor.inspectedElement, 'translateY', $event)" />
      </label>
      <label>
        <span>Scale X</span>
        <input type="number" step="0.01"
               [ngModel]="transformValue(editor.inspectedElement, 'scaleX')"
               (ngModelChange)="setTransformValue(editor.inspectedElement, 'scaleX', $event)" />
      </label>
      <label>
        <span>Scale Y</span>
        <input type="number" step="0.01"
               [ngModel]="transformValue(editor.inspectedElement, 'scaleY')"
               (ngModelChange)="setTransformValue(editor.inspectedElement, 'scaleY', $event)" />
      </label>
      <label>
        <span>Rotate</span>
        <input type="number" step="1"
               [ngModel]="transformValue(editor.inspectedElement, 'rotation')"
               (ngModelChange)="setTransformValue(editor.inspectedElement, 'rotation', $event)" />
      </label>
      <label>
        <span>Origin X</span>
        <input type="number"
               [ngModel]="transformValue(editor.inspectedElement, 'originX')"
               (ngModelChange)="setTransformValue(editor.inspectedElement, 'originX', $event)" />
      </label>
      <label>
        <span>Origin Y</span>
        <input type="number"
               [ngModel]="transformValue(editor.inspectedElement, 'originY')"
               (ngModelChange)="setTransformValue(editor.inspectedElement, 'originY', $event)" />
      </label>
    </div>
    <div class="transform-actions">
      <button type="button" (click)="flipElement(editor.inspectedElement, 'x')">Flip X</button>
      <button type="button" (click)="flipElement(editor.inspectedElement, 'y')">Flip Y</button>
    </div>
  </div>
  <div class="attr-list">
    <ng-container *ngFor="let attr of editor.inspectedElement.attributes">
      <div class="attr-row">
        <attr-text   *ngIf="attr.input == 'text'"
                     [ngModel]="settingsOf(editor.inspectedElement)[attr.output]"
                     (ngModelChange)="handleAttributeChange(editor.inspectedElement, attr, $event)"
                     [label]="attr.label"></attr-text>
        <attr-bool   *ngIf="attr.input == 'bool'"
                     [ngModel]="settingsOf(editor.inspectedElement)[attr.output]"
                     (ngModelChange)="handleAttributeChange(editor.inspectedElement, attr, $event)"
                     [label]="attr.label"></attr-bool>
        <color       *ngIf="attr.input == 'color'"
                     [ngModel]="settingsOf(editor.inspectedElement)[attr.output]"
                     (ngModelChange)="handleAttributeChange(editor.inspectedElement, attr, $event)"
                     [label]="attr.label"></color>
        <color       *ngIf="attr.input == 'paint' && !asGradientPaint(settingsOf(editor.inspectedElement)[attr.output])"
                     [ngModel]="settingsOf(editor.inspectedElement)[attr.output]"
                     (ngModelChange)="handleAttributeChange(editor.inspectedElement, attr, $event)"
                     [label]="attr.label"></color>
        <button class="paint-gradient-enable"
                *ngIf="attr.input == 'paint' && !asGradientPaint(settingsOf(editor.inspectedElement)[attr.output])"
                type="button"
                (click)="enableGradientPaint(editor.inspectedElement, attr.output)">Use Gradient</button>
        <div class="gradient-editor"
             *ngIf="attr.input == 'paint' && asGradientPaint(settingsOf(editor.inspectedElement)[attr.output]) as gradient"
             (click)="selectGradientPaint(attr.output)">
          <div class="gradient-header">
            <strong>{{ attr.label }}</strong>
            <button type="button"
                    (click)="useSolidPaint(editor.inspectedElement, attr.output, gradient)">Use Solid</button>
          </div>
          <div class="gradient-grid">
            <label>
              <span>Type</span>
              <select [ngModel]="gradient.type"
                      (ngModelChange)="setGradientKind(editor.inspectedElement, attr.output, gradient, $event)">
                <option value="linear-gradient">Linear</option>
                <option value="radial-gradient">Radial</option>
              </select>
            </label>
            <label>
              <span>Units</span>
              <select [ngModel]="gradient.units"
                      (ngModelChange)="setGradientUnits(editor.inspectedElement, gradient, $event)">
                <option value="objectBoundingBox">Object box</option>
                <option value="userSpaceOnUse">User space</option>
              </select>
            </label>
            <label>
              <span>Spread</span>
              <select [ngModel]="gradient.spreadMethod"
                      (ngModelChange)="setGradientMeta(gradient, 'spreadMethod', $event)">
                <option value="pad">Pad</option>
                <option value="reflect">Reflect</option>
                <option value="repeat">Repeat</option>
              </select>
            </label>
          </div>
          <div class="gradient-handle-hint">Drag the amber handles on the canvas to edit geometry.</div>
          <div class="gradient-stops-control">
            <button class="gradient-stops-trigger" type="button"
                    (click)="toggleGradientStopsPopover(editor.inspectedElement, attr.output, $event)">
              Edit {{ gradient.stops.length }} Stops
            </button>
          <div class="gradient-stops gradient-stops-popover"
               *ngIf="gradientStopsPopoverOpen(editor.inspectedElement, attr.output)"
               [ngStyle]="gradientStopsPopoverStyle()"
               (click)="$event.stopPropagation()" (pointerdown)="$event.stopPropagation()">
            <div class="gradient-stop" *ngFor="let stop of gradient.stops; let stopIndex = index">
              <div class="gradient-stop-title">
                <span>Stop {{ stopIndex + 1 }}</span>
                <button type="button" [disabled]="gradient.stops.length <= 2"
                        (click)="removeGradientStop(editor.inspectedElement, attr.output, gradient, stop)">Remove</button>
              </div>
              <label>
                <span>Offset</span>
                <input type="number" min="0" max="1" step="0.01" [ngModel]="stop.offset"
                       (ngModelChange)="setGradientStopValue(editor.inspectedElement, attr.output, stop, 'offset', $event)" />
              </label>
              <color [ngModel]="stop.color"
                     (ngModelChange)="setGradientStopValue(editor.inspectedElement, attr.output, stop, 'color', $event)"></color>
            </div>
            <button class="gradient-add-stop" type="button"
                    (click)="addGradientStop(gradient)">Add Stop</button>
          </div>
          </div>
        </div>
        <range       *ngIf="attr.input == 'range'"
                     [ngModel]="settingsOf(editor.inspectedElement)[attr.output]"
                     (ngModelChange)="handleAttributeChange(editor.inspectedElement, attr, $event)"
                     [min]="$any(attr).min" [max]="$any(attr).max"
                     [label]="attr.label"></range>
        <attr-select *ngIf="attr.input == 'select'"
                     [ngModel]="settingsOf(editor.inspectedElement)[attr.output]"
                     (ngModelChange)="handleAttributeChange(editor.inspectedElement, attr, $event)"
                     [options]="$any(attr).options"
                     [label]="attr.label"></attr-select>
      </div>
    </ng-container>
  </div>
</ng-container>
<div class="panel-empty" *ngIf="!editor.inspectedElement">
  <fa-icon icon="mouse-pointer"></fa-icon>
  <span>Select an element</span>
</div>
