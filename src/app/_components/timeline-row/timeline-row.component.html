<div class="timeline-left-cell"
     [ngClass]="{'selected': timeline.editor.selectedElement == row.element, 'property': row.type == 'property', 'popover-open': timeline.colorEditorOpen(row)}"
     [style.padding-left.px]="10 + row.depth * 16"
     (click)="timeline.selectTimelineRow(row)"
     (contextmenu)="timeline.openRowContextMenu(row, $event)">
  <button class="row-expander"
          *ngIf="row.type == 'layer'"
          (click)="$event.stopPropagation(); timeline.toggleLayer(row.element)">
    <fa-icon [icon]="timeline.expandedLayerIds.has(row.element.id) ? 'angle-down' : 'angle-right'"></fa-icon>
  </button>
  <span class="row-expander-placeholder" *ngIf="row.type == 'property'"></span>
  <span class="row-name" *ngIf="row.type == 'layer'">{{ row.element.name }}</span>
  <ng-container *ngIf="row.type == 'property'">
    <span class="row-name">{{ row.property.label }}</span>
    <button class="scale-link-toggle"
            *ngIf="timeline.isScaleRow(row)"
            [class.active]="timeline.scaleLinked(row)"
            (click)="timeline.toggleScaleLinked(row, $event)"
            [title]="timeline.scaleLinked(row) ? 'Uniform scale: key both dimensions' : 'Split scale: key this dimension only'">
      {{ timeline.scaleLinked(row) ? 'Uniform' : 'Split' }}
    </button>
    <span class="row-value" *ngIf="row.property.valueType != 'color' && !timeline.isGradientStopsRow(row)">{{ timeline.propertyDisplayValue(row) }}</span>
    <div class="gradient-stops-control" *ngIf="timeline.isGradientStopsRow(row) && timeline.gradientForRow(row) as gradient"
         (click)="$event.stopPropagation()" (pointerdown)="$event.stopPropagation()">
      <button class="gradient-stops-trigger" (click)="timeline.toggleColorEditor(row, $event)"
              title="Edit gradient stops" aria-label="Edit gradient stops">
        <span class="gradient-paint-preview" [style.background]="timeline.gradientPreview(gradient)"></span>
      </button>
      <div class="gradient-stops-popover" *ngIf="timeline.colorEditorOpen(row)" [ngStyle]="timeline.paintPopoverStyle()"
           (click)="$event.stopPropagation()" (pointerdown)="$event.stopPropagation()">
        <app-paint-editor [paint]="gradient" [compact]="true"
                          [capabilities]="gradientStopsCapabilities"
                          (paintChange)="timeline.setTimelinePaint(row, $event)" />
      </div>
    </div>
    <input class="property-number"
           *ngIf="row.property.valueType == 'number'"
           type="number"
           step="0.01"
           [ngModel]="timeline.propertyValue(row)"
           (click)="$event.stopPropagation()"
           (pointerdown)="timeline.beginNumberDrag(row, $event)"
           (ngModelChange)="timeline.setPropertyValue(row, $event)" />
    <label class="property-bool" *ngIf="row.property.valueType == 'boolean'">
      <input type="checkbox"
             [ngModel]="timeline.propertyValue(row)"
             (click)="$event.stopPropagation()"
             (ngModelChange)="timeline.setPropertyValue(row, $event)" />
    </label>
    <div class="property-color"
         *ngIf="row.property.valueType == 'color'"
         (click)="$event.stopPropagation()"
         (pointerdown)="$event.stopPropagation()">
      <button class="color-compact"
              (click)="timeline.toggleColorEditor(row, $event)"
              title="Edit color">
        <span class="color-swatch" [style.background-color]="timeline.colorDisplayValue(row)"></span>
        <span class="color-hex">{{ timeline.colorDisplayValue(row) }}</span>
      </button>
      <div class="color-popover"
           *ngIf="timeline.colorEditorOpen(row)"
           [ngStyle]="timeline.paintPopoverStyle()"
           (click)="$event.stopPropagation()"
           (pointerdown)="$event.stopPropagation()">
        <app-paint-editor [paint]="timeline.colorValue(row)" [compact]="true"
                          [capabilities]="solidPaintCapabilities"
                          (paintChange)="timeline.setTimelinePaint(row, $event)" />
      </div>
    </div>
    <div class="key-controls">
      <button class="key-button"
              [disabled]="timeline.previousKeyframeTime(row) == null"
              (click)="timeline.jumpToKeyframe(row, 'previous', $event)"
              title="Previous keyframe">
        <fa-icon icon="chevron-left"></fa-icon>
      </button>
      <button class="key-button key-toggle"
              [ngClass]="{'active': timeline.hasKeyAtTime(row)}"
              (click)="$event.stopPropagation(); timeline.toggleKey(row)"
              [title]="timeline.hasKeyAtTime(row) ? 'Remove keyframe' : 'Add keyframe'">
        <fa-icon icon="diamond"></fa-icon>
      </button>
      <button class="key-button"
              [disabled]="timeline.nextKeyframeTime(row) == null"
              (click)="timeline.jumpToKeyframe(row, 'next', $event)"
              title="Next keyframe">
        <fa-icon icon="chevron-right"></fa-icon>
      </button>
    </div>
  </ng-container>
</div>
