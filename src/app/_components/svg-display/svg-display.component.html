<ng-template #renderElements let-elements>
<ng-container *ngFor="let element of elements">
    <ng-container *ngIf="element.visible && asGroup(element) as group">
        <svg:defs *ngIf="group.clipElement">
            <svg:clipPath [id]="group.clipPathId">
                <ng-container *ngTemplateOutlet="renderElements; context: { $implicit: clipElementList(group) }"></ng-container>
            </svg:clipPath>
        </svg:defs>
        <svg:g [id]="group.id" [attr.clip-path]="clipUrl(group)" [attr.transform]="transformAttr(group)" [attr.opacity]="opacityAttr(group)">
            <ng-container *ngTemplateOutlet="renderElements; context: { $implicit: group.renderedElements }"></ng-container>
        </svg:g>
    </ng-container>
    <ng-container *ngIf="element.visible && asPath(element) as path">
        <svg:path
        [id]="path.id"
        [attr.d]="path.raw"
        [attr.transform]="transformAttr(path)"
        [attr.opacity]="opacityAttr(path)"
        [attr.fill]="path.settings.fill_enabled && path.settings.fill ? path.settings.fill.hex : 'none'"
        [attr.fill-rule]="path.fillRule"
        [attr.stroke]="path.settings.stroke?.hex"
        [attr.stroke-width]="path.settings.stroke_width"
        [attr.stroke-linecap]="path.settings.line_cap"
        [attr.stroke-linejoin]="path.settings.line_join"
        [attr.pathLength]="drawPathLengthAttr(path)"
        [attr.stroke-dasharray]="drawDasharrayAttr(path)"
        [attr.stroke-dashoffset]="drawDashoffsetAttr(path)"
        />
    </ng-container>
    <ng-container *ngIf="element.visible && asShape(element) as shape">
        <svg:rect
        *ngIf="editor.shapeIsRectangle(shape)"
        [id]="shape.id"
        [attr.transform]="transformAttr(shape)"
        [attr.opacity]="opacityAttr(shape)"
        [attr.x]="shape.x"
        [attr.y]="shape.y"
        [attr.width]="shape.width"
        [attr.height]="shape.height"
        [attr.rx]="shape.settings.corner_radius || null"
        [attr.ry]="shape.settings.corner_radius || null"
        [attr.fill]="shape.settings.fill?.hex ?? 'none'"
        [attr.stroke]="shape.settings.stroke?.hex"
        [attr.stroke-width]="shape.settings.stroke_width"
        />
        <svg:ellipse
        *ngIf="editor.shapeIsEllipse(shape)"
        [id]="shape.id"
        [attr.transform]="transformAttr(shape)"
        [attr.opacity]="opacityAttr(shape)"
        [attr.cx]="shape.centerX"
        [attr.cy]="shape.centerY"
        [attr.rx]="shape.radiusX"
        [attr.ry]="shape.radiusY"
        [attr.fill]="shape.settings.fill?.hex ?? 'none'"
        [attr.stroke]="shape.settings.stroke?.hex"
        [attr.stroke-width]="shape.settings.stroke_width"
        />
    </ng-container>
    <ng-container *ngIf="element.visible && asText(element) as text">
        <svg:text
        [id]="text.id"
        [attr.transform]="transformAttr(text)"
        [attr.opacity]="opacityAttr(text)"
        [attr.x]="text.x"
        [attr.y]="text.y"
        [attr.font-size]="text.settings.font_size"
        [attr.font-family]="text.settings.font_family"
        [attr.font-weight]="text.settings.font_weight"
        [attr.text-anchor]="text.textAnchor"
        [attr.fill]="text.settings.color?.hex ?? '#000000'"
        dominant-baseline="hanging">
            <svg:tspan
            *ngFor="let span of textTspans(text)"
            [attr.x]="text.x"
            [attr.dy]="span.dy">{{ span.text }}</svg:tspan>
        </svg:text>
    </ng-container>
</ng-container>
</ng-template>

<ng-container *ngTemplateOutlet="renderElements; context: { $implicit: editor.selectedSVG?.elements }"></ng-container>

<ng-container *ngFor="let element of editor.selectedSVG?.tempElements">
    <ng-container *ngIf="editor.elementIsPath(element)">
        <svg:path [id]="element.id" [attr.d]="element.raw" [attr.transform]="transformAttr(element)" [attr.opacity]="opacityAttr(element)" stroke="#aeaeae" stroke-width="2" fill="transparent"/>
    </ng-container>
    <ng-container *ngIf="asShape(element) as shape">
        <svg:rect
        *ngIf="editor.shapeIsRectangle(shape)"
        [id]="shape.id"
        [attr.transform]="transformAttr(shape)"
        [attr.opacity]="opacityAttr(shape)"
        [attr.x]="shape.x"
        [attr.y]="shape.y"
        [attr.width]="shape.width"
        [attr.height]="shape.height"
        [attr.fill]="shape.settings.fill?.hex ?? 'none'"
        [attr.stroke]="shape.settings.stroke?.hex"
        [attr.stroke-width]="shape.settings.stroke_width"
        />
        <svg:ellipse
        *ngIf="editor.shapeIsEllipse(shape)"
        [id]="shape.id"
        [attr.transform]="transformAttr(shape)"
        [attr.opacity]="opacityAttr(shape)"
        [attr.cx]="shape.centerX"
        [attr.cy]="shape.centerY"
        [attr.rx]="shape.radiusX"
        [attr.ry]="shape.radiusY"
        [attr.fill]="shape.settings.fill?.hex ?? 'none'"
        [attr.stroke]="shape.settings.stroke?.hex"
        [attr.stroke-width]="shape.settings.stroke_width"
        />
    </ng-container>
</ng-container>

<svg:g editorOverlay #overlay="editorOverlay">
<ng-container *ngIf="overlay.selectionBox(editor.selectedElement) as box">
    <svg:polygon
    data-transform-handle="move"
    [attr.points]="box.points"
    fill="rgba(45, 212, 191, 0.025)"
    stroke="#2dd4bf"
    [attr.stroke-width]="overlay.screenPx(1.25)"
    [attr.stroke-dasharray]="overlay.screenDash(5, 4)"
    vector-effect="non-scaling-stroke"
    pointer-events="all"
    />
    <svg:line
    [attr.x1]="box.topCenter.x"
    [attr.y1]="box.topCenter.y"
    [attr.x2]="box.rotate.x"
    [attr.y2]="box.rotate.y"
    stroke="#2dd4bf"
    [attr.stroke-width]="overlay.screenPx(1)"
    vector-effect="non-scaling-stroke"
    pointer-events="none"
    />
</ng-container>

<ng-container *ngIf="editor.selectedElement?.visible && !editor.selectedElement?.locked && overlay.asPath(editor.selectedElement) as selectedPath">
    <svg:g [attr.transform]="overlay.selectedTransform(selectedPath)">
        <ng-container *ngFor="let segment of overlay.completeSegments(selectedPath)">
            <svg:path
            [attr.data-segment-id]="segment.id"
            [attr.d]="overlay.segmentPath(selectedPath, segment)"
            fill="none"
            [attr.stroke]="overlay.segmentSelected(segment) ? '#2dd4bf' : 'transparent'"
            [attr.stroke-width]="overlay.screenPx(overlay.segmentSelected(segment) ? 2.5 : 12)"
            vector-effect="non-scaling-stroke"
            [attr.pointer-events]="'stroke'"
            />
        </ng-container>

        <ng-container *ngFor="let segment of overlay.bezierSegments(selectedPath)">
            <svg:line
            [attr.x1]="segment.points[0].x"
            [attr.y1]="segment.points[0].y"
            [attr.x2]="segment.controlStart?.x"
            [attr.y2]="segment.controlStart?.y"
            stroke="#7c8aa5"
            [attr.stroke-width]="overlay.screenPx(1)"
            [attr.stroke-dasharray]="overlay.screenDash(3, 3)"
            vector-effect="non-scaling-stroke"
            />
            <svg:line
            [attr.x1]="segment.points[1].x"
            [attr.y1]="segment.points[1].y"
            [attr.x2]="segment.controlEnd?.x"
            [attr.y2]="segment.controlEnd?.y"
            stroke="#7c8aa5"
            [attr.stroke-width]="overlay.screenPx(1)"
            [attr.stroke-dasharray]="overlay.screenDash(3, 3)"
            vector-effect="non-scaling-stroke"
            />
        </ng-container>
    </svg:g>
</ng-container>

<ng-container *ngIf="overlay.selectionBox(editor.selectedElement) as box">
    <svg:circle
    data-transform-handle="rotate"
    [attr.cx]="box.rotate.x"
    [attr.cy]="box.rotate.y"
    [attr.r]="overlay.screenPx(6)"
    fill="#ffffff"
    stroke="#2dd4bf"
    [attr.stroke-width]="overlay.screenPx(1.5)"
    vector-effect="non-scaling-stroke"
    />
    <svg:circle
    data-transform-handle="origin"
    [attr.cx]="box.pivot.x"
    [attr.cy]="box.pivot.y"
    [attr.r]="overlay.screenPx(5)"
    fill="#2dd4bf"
    stroke="#14141a"
    [attr.stroke-width]="overlay.screenPx(1.5)"
    vector-effect="non-scaling-stroke"
    />
    <ng-container *ngFor="let handle of box.handles">
        <svg:rect
        [attr.data-transform-handle]="handle.role"
        [attr.x]="handle.x - overlay.screenPx(4)"
        [attr.y]="handle.y - overlay.screenPx(4)"
        [attr.width]="overlay.screenPx(8)"
        [attr.height]="overlay.screenPx(8)"
        fill="#ffffff"
        stroke="#2dd4bf"
        [attr.stroke-width]="overlay.screenPx(1.25)"
        vector-effect="non-scaling-stroke"
        />
    </ng-container>
</ng-container>

<ng-container *ngIf="editor.selectedElement?.visible && !editor.selectedElement?.locked && overlay.asPath(editor.selectedElement) as selectedPath">
    <svg:g [attr.transform]="overlay.selectedTransform(selectedPath)">
        <ng-container *ngFor="let segment of overlay.bezierSegments(selectedPath)">
            <svg:circle
            [attr.data-point-role]="'control-start'"
            [attr.data-point-id]="segment.controlStart?.id"
            [attr.data-line-id]="segment.id"
            [attr.cx]="segment.controlStart?.x"
            [attr.cy]="segment.controlStart?.y"
            [attr.r]="overlay.screenPx(4)"
            fill="#14141a"
            stroke="#2dd4bf"
            [attr.stroke-width]="overlay.screenPx(1.5)"
            vector-effect="non-scaling-stroke"
            />
            <svg:circle
            [attr.data-point-role]="'control-end'"
            [attr.data-point-id]="segment.controlEnd?.id"
            [attr.data-line-id]="segment.id"
            [attr.cx]="segment.controlEnd?.x"
            [attr.cy]="segment.controlEnd?.y"
            [attr.r]="overlay.screenPx(4)"
            fill="#14141a"
            stroke="#2dd4bf"
            [attr.stroke-width]="overlay.screenPx(1.5)"
            vector-effect="non-scaling-stroke"
            />
        </ng-container>

        <ng-container *ngFor="let anchor of overlay.pathAnchors(selectedPath)">
            <svg:circle
            [attr.data-point-role]="'anchor'"
            [attr.data-point-id]="anchor.id"
            [attr.cx]="anchor.x"
            [attr.cy]="anchor.y"
            [attr.r]="overlay.screenPx(4.5)"
            fill="#14141a"
            [attr.stroke]="editor.selectedPathAnchor == anchor ? '#2dd4bf' : '#dddde8'"
            [attr.stroke-width]="overlay.screenPx(1.5)"
            vector-effect="non-scaling-stroke"
            />
        </ng-container>
    </svg:g>
</ng-container>
</svg:g>
