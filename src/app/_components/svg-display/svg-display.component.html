    </ng-container>
</svg:defs>

<ng-template #renderElements let-elements let-parentId="parentId" let-includeSource="includeSource" let-clipGeometry="clipGeometry">

    </ng-container>
    <ng-container *ngIf="asShape(element) as shape">
        <svg:rect *ngIf="clipGeometry && editor.shapeIsRectangle(shape)" [attr.transform]="transformAttr(shape)" [attr.x]="shape.x" [attr.y]="shape.y" [attr.width]="shape.width" [attr.height]="shape.height" [attr.rx]="shape.settings.corner_radius || null" [attr.ry]="shape.settings.corner_radius || null" />

        [attr.cx]="shape.centerX"

        [attr.stroke-opacity]="paintOpacity(shape.settings.stroke)"

                    <svg:rect *ngIf="editor.shapeIsRectangle(shape)" [attr.x]="shape.x" [attr.y]="shape.y" [attr.width]="shape.width" [attr.height]="shape.height" [attr.rx]="shape.settings.corner_radius || null" [attr.ry]="shape.settings.corner_radius || null" fill="black" />
                    <svg:ellipse *ngIf="editor.shapeIsEllipse(shape)" [attr.cx]="shape.centerX" [attr.cy]="shape.centerY" [attr.rx]="shape.radiusX" [attr.ry]="shape.radiusY" fill="black" />

            <svg:ellipse data-render-role="fill" *ngIf="editor.shapeIsEllipse(shape)" [attr.cx]="shape.centerX" [attr.cy]="shape.centerY" [attr.rx]="shape.radiusX" [attr.ry]="shape.radiusY" [attr.fill]="paintValue(shape.settings.fill) ?? 'none'" [attr.fill-opacity]="paintOpacity(shape.settings.fill)" />
            <svg:rect data-render-role="stroke" *ngIf="editor.shapeIsRectangle(shape)" [attr.x]="shape.x" [attr.y]="shape.y" [attr.width]="shape.width" [attr.height]="shape.height" [attr.rx]="shape.settings.corner_radius || null" [attr.ry]="shape.settings.corner_radius || null" fill="none" [attr.stroke]="paintValue(shape.settings.stroke)" [attr.stroke-opacity]="paintOpacity(shape.settings.stroke)" [attr.stroke-width]="shape.settings.stroke_width * 2" [attr.stroke-linecap]="shape.settings.line_cap" [attr.stroke-linejoin]="shape.settings.line_join" [attr.stroke-miterlimit]="shape.settings.stroke_miterlimit" [attr.stroke-dasharray]="strokeDasharray(shape)" [attr.stroke-dashoffset]="strokeDashoffset(shape)" [attr.clip-path]="strokeAlignment(shape) === 'inside' ? strokeEffectUrl(shape) : null" [attr.mask]="strokeAlignment(shape) === 'outside' ? strokeEffectUrl(shape) : null" />

    <ng-container *ngIf="asText(element) as text">

<ng-container *ngTemplateOutlet="renderElements; context: { $implicit: editor.selectedSVG?.elements, parentId: null, includeSource: true, clipGeometry: false }"></ng-container>

<ng-container *ngFor="let element of editor.selectedSVG?.tempElements">

        <svg:path [id]="element.id" [attr.d]="element.raw" [attr.transform]="transformAttr(element)" [attr.opacity]="opacityAttr(element)" stroke="#aeaeae" stroke-width="2" fill="transparent"/>

    <ng-container *ngIf="asShape(element) as shape">
        <svg:rect
        *ngIf="editor.shapeIsRectangle(shape)"
        [id]="shape.id"
        [attr.transform]="transformAttr(shape)"
        [attr.opacity]="opacityAttr(shape)"
        [attr.x]="shape.x"
        [attr.y]="shape.y"

        [attr.height]="shape.height"

        [id]="shape.id"
        [attr.transform]="transformAttr(shape)"
        [attr.opacity]="opacityAttr(shape)"

        [attr.cy]="shape.centerY"
        [attr.rx]="shape.radiusX"
        [attr.ry]="shape.radiusY"

</ng-container>

<svg:g class="editor-overlay" editorOverlay #overlay="editorOverlay">
<ng-container *ngIf="overlay.selectionBox(editor.selectedElement) as box">
    <svg:polygon
    data-transform-handle="move"
    [attr.points]="box.points"
    fill="rgba(45, 212, 191, 0.025)"
    stroke="#2dd4bf"
    [attr.stroke-width]="overlay.screenPx(1.25)"
    [attr.stroke-dasharray]="overlay.screenDash(5, 4)"
    vector-effect="non-scaling-stroke"
    pointer-events="all"
    />
    <svg:line
    [attr.x1]="box.topCenter.x"
    [attr.y1]="box.topCenter.y"
    [attr.x2]="box.rotate.x"
    [attr.y2]="box.rotate.y"
    stroke="#2dd4bf"
    [attr.stroke-width]="overlay.screenPx(1)"
    vector-effect="non-scaling-stroke"
    pointer-events="none"
    />
</ng-container>

<ng-container *ngIf="editor.selectedElement?.visible && !editor.selectedElement?.locked && overlay.asPath(editor.selectedElement) as selectedPath">
    <svg:g [attr.transform]="overlay.selectedTransform(selectedPath)">
        <ng-container *ngFor="let segment of overlay.completeSegments(selectedPath)">
            <svg:path
            [attr.data-segment-id]="segment.id"
            [attr.d]="overlay.segmentPath(selectedPath, segment)"
            fill="none"
            [attr.stroke]="overlay.segmentSelected(segment) ? '#2dd4bf' : 'transparent'"
            [attr.stroke-width]="overlay.screenPx(overlay.segmentSelected(segment) ? 2.5 : 12)"
            vector-effect="non-scaling-stroke"
            [attr.pointer-events]="'stroke'"
            />
        </ng-container>

        <ng-container *ngFor="let segment of overlay.bezierSegments(selectedPath)">
            <svg:line
            [attr.x1]="segment.points[0].x"
            [attr.y1]="segment.points[0].y"
            [attr.x2]="segment.controlStart?.x"
            [attr.y2]="segment.controlStart?.y"
            stroke="#7c8aa5"
            [attr.stroke-width]="overlay.screenPx(1)"
            [attr.stroke-dasharray]="overlay.screenDash(3, 3)"
            vector-effect="non-scaling-stroke"
            />
            <svg:line
            [attr.x1]="segment.points[1].x"
            [attr.y1]="segment.points[1].y"
            [attr.x2]="segment.controlEnd?.x"
            [attr.y2]="segment.controlEnd?.y"
            stroke="#7c8aa5"
            [attr.stroke-width]="overlay.screenPx(1)"
            [attr.stroke-dasharray]="overlay.screenDash(3, 3)"
            vector-effect="non-scaling-stroke"
            />
        </ng-container>
    </svg:g>
</ng-container>

<ng-container *ngIf="overlay.selectionBox(editor.selectedElement) as box">
    <svg:circle
    data-transform-handle="rotate"
    [attr.cx]="box.rotate.x"
    [attr.cy]="box.rotate.y"
    [attr.r]="overlay.screenPx(6)"
    fill="#ffffff"
    stroke="#2dd4bf"
    [attr.stroke-width]="overlay.screenPx(1.5)"
    vector-effect="non-scaling-stroke"
    />
    <svg:circle
    data-transform-handle="origin"
    [attr.cx]="box.pivot.x"
    [attr.cy]="box.pivot.y"
    [attr.r]="overlay.screenPx(5)"
    fill="#2dd4bf"
    stroke="#14141a"
    [attr.stroke-width]="overlay.screenPx(1.5)"
    vector-effect="non-scaling-stroke"
    />
    <ng-container *ngFor="let handle of box.handles">
        <svg:rect
        [attr.data-transform-handle]="handle.role"
        [attr.x]="handle.x - overlay.screenPx(4)"
        [attr.y]="handle.y - overlay.screenPx(4)"
        [attr.width]="overlay.screenPx(8)"
        [attr.height]="overlay.screenPx(8)"
        fill="#ffffff"
        stroke="#2dd4bf"
        [attr.stroke-width]="overlay.screenPx(1.25)"
        vector-effect="non-scaling-stroke"
        />
    </ng-container>
</ng-container>

<ng-container *ngIf="editor.selectedElement?.visible && !editor.selectedElement?.locked && overlay.asPath(editor.selectedElement) as selectedPath">
    <svg:g [attr.transform]="overlay.selectedTransform(selectedPath)">
        <ng-container *ngFor="let segment of overlay.bezierSegments(selectedPath)">
            <svg:circle
            [attr.data-point-role]="'control-start'"
            [attr.data-point-id]="segment.controlStart?.id"
            [attr.data-line-id]="segment.id"
            [attr.cx]="segment.controlStart?.x"
            [attr.cy]="segment.controlStart?.y"
            [attr.r]="overlay.screenPx(4)"
            fill="#14141a"
            stroke="#2dd4bf"
            [attr.stroke-width]="overlay.screenPx(1.5)"
            vector-effect="non-scaling-stroke"
            />
            <svg:circle
            [attr.data-point-role]="'control-end'"
            [attr.data-point-id]="segment.controlEnd?.id"
            [attr.data-line-id]="segment.id"
            [attr.cx]="segment.controlEnd?.x"
            [attr.cy]="segment.controlEnd?.y"
            [attr.r]="overlay.screenPx(4)"
            fill="#14141a"
            stroke="#2dd4bf"
            [attr.stroke-width]="overlay.screenPx(1.5)"
            vector-effect="non-scaling-stroke"
            />
        </ng-container>

        <ng-container *ngFor="let anchor of overlay.pathAnchors(selectedPath)">
            <svg:circle
            [attr.data-point-role]="'anchor'"
            [attr.data-point-id]="anchor.id"
            [attr.cx]="anchor.x"
            [attr.cy]="anchor.y"
            [attr.r]="overlay.screenPx(4.5)"
            fill="#14141a"
            [attr.stroke]="editor.selectedPathAnchor == anchor ? '#2dd4bf' : '#dddde8'"
            [attr.stroke-width]="overlay.screenPx(1.5)"
            vector-effect="non-scaling-stroke"
            />
        </ng-container>
    </svg:g>
</ng-container>
<ng-container *ngIf="editor.selectedElement?.visible && !editor.selectedElement?.locked && overlay.gradient(editor.selectedElement) as gradient">
    <svg:g [attr.transform]="overlay.selectedTransform(editor.selectedElement!)">
        <ng-container *ngIf="gradient.kind == 'linear'">
            <svg:line [attr.x1]="gradient.start?.x" [attr.y1]="gradient.start?.y" [attr.x2]="gradient.end?.x" [attr.y2]="gradient.end?.y"
                      stroke="#f59e0b" [attr.stroke-width]="overlay.screenPx(1.5)" vector-effect="non-scaling-stroke" pointer-events="none" />
            <svg:circle data-gradient-handle="start" [attr.cx]="gradient.start?.x" [attr.cy]="gradient.start?.y"
                        [attr.r]="overlay.screenPx(5)" fill="#14141a" stroke="#f59e0b" [attr.stroke-width]="overlay.screenPx(2)" vector-effect="non-scaling-stroke" />
            <svg:circle data-gradient-handle="end" [attr.cx]="gradient.end?.x" [attr.cy]="gradient.end?.y"
                        [attr.r]="overlay.screenPx(5)" fill="#f59e0b" stroke="#14141a" [attr.stroke-width]="overlay.screenPx(1.5)" vector-effect="non-scaling-stroke" />
        </ng-container>
        <ng-container *ngIf="gradient.kind == 'radial'">
            <svg:line [attr.x1]="gradient.center?.x" [attr.y1]="gradient.center?.y" [attr.x2]="gradient.radius?.x" [attr.y2]="gradient.radius?.y"
