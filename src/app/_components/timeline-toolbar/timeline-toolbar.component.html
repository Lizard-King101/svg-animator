<div class="timeline-toolbar">
  <button class="timeline-icon" (click)="timeline.animation.togglePlayback()" [title]="timeline.animation.playing ? 'Pause' : 'Play'">
    <fa-icon [icon]="timeline.animation.playing ? 'pause' : 'play'"></fa-icon>
  </button>
  <button class="timeline-icon" (click)="timeline.animation.stop()" title="Stop">
    <fa-icon icon="stop"></fa-icon>
  </button>
  <label class="timeline-field">
    <span>Time</span>
    <input class="timeline-current-time" type="number" min="0" step="0.01"
           [ngModel]="timeline.animation.currentTime"
           (ngModelChange)="timeline.animation.seek($event)" />
  </label>
  <label class="timeline-field">
    <span>Duration</span>
    <input type="number" min="0.1" step="0.1"
           [ngModel]="timeline.animation.duration"
           (ngModelChange)="timeline.setDuration($event)" />
  </label>
  <label class="timeline-check">
    <input type="checkbox"
           [ngModel]="timeline.animation.loop"
           (ngModelChange)="timeline.setLoop($event)" />
    <span>Loop</span>
  </label>
  <div class="timeline-toolbar-sep"></div>
  <button class="timeline-icon" (click)="timeline.zoomTimeline(-20)" title="Zoom out">
    <fa-icon icon="minus"></fa-icon>
  </button>
  <button class="timeline-icon" (click)="timeline.fitTimeline()" title="Fit duration">
    <fa-icon icon="arrows-left-right"></fa-icon>
  </button>
  <button class="timeline-icon" (click)="timeline.zoomTimeline(20)" title="Zoom in">
    <fa-icon icon="plus"></fa-icon>
  </button>
  <label class="timeline-zoom-field" title="Time zoom in pixels per second">
    <span>Time zoom</span>
    <input type="range" min="10" max="2000" step="10" [ngModel]="timeline.pixelsPerSecond" (ngModelChange)="timeline.setTimelineZoom($event)" />
    <output>{{ timeline.pixelsPerSecond }}</output>
  </label>
  <div class="timeline-toolbar-sep"></div>
  <div class="surface-switch" aria-label="Timeline surface">
    <button class="surface-button" [class.active]="timeline.surfaceMode == 'timeline'" (click)="timeline.toggleSurfaceMode('timeline')">Timeline</button>
    <button class="surface-button" [class.active]="timeline.surfaceMode == 'graph'" (click)="timeline.toggleSurfaceMode('graph')">Graph</button>
  </div>
  <ng-container *ngIf="timeline.surfaceMode == 'graph'">
    <select class="graph-track-select" [ngModel]="timeline.selectedGraphProperty" (ngModelChange)="timeline.selectGraphProperty($event)" title="Speed graph property">
      <option *ngFor="let option of timeline.graphTrackOptions()" [ngValue]="option.property">{{ option.label }}</option>
    </select>
    <button class="timeline-icon" (click)="timeline.fitSpeed()" title="Fit Speed">Fit</button>
    <button class="timeline-icon" (click)="timeline.zoomSpeed(1.25)" title="Zoom speed out"><fa-icon icon="minus"></fa-icon></button>
    <button class="timeline-icon" (click)="timeline.zoomSpeed(0.8)" title="Zoom speed in"><fa-icon icon="plus"></fa-icon></button>
    <ng-container *ngIf="timeline.activeGraphHandle">
      <span class="active-axis-badge" [attr.data-axis]="timeline.graphAxis(timeline.activeGraphHandle.track.property)">{{ timeline.activeHandleAxisLabel() }}</span>
      <label class="timeline-field graph-field"><span>Speed</span><input type="number" step="0.01" [ngModel]="timeline.activeHandleSpeed()" (ngModelChange)="timeline.setActiveHandleValue('speed', $event)" /></label>
      <label class="timeline-field graph-field"><span>Influence</span><input type="number" min="0" max="1" step="0.01" [ngModel]="timeline.activeHandleInfluence()" (ngModelChange)="timeline.setActiveHandleValue('influence', $event)" /></label>
      <button class="surface-button" [class.active]="timeline.activeHandleLinked()" (click)="timeline.relinkActiveHandle()">Link</button>
    </ng-container>
  </ng-container>
  <div class="timeline-toolbar-sep"></div>
  <div class="easing-switch" title="Selected keyframe easing">
    <button class="timeline-icon easing-button"
            *ngFor="let option of timeline.easingOptions"
            [disabled]="timeline.selectedKeyframeIds.size == 0"
            [ngClass]="{'active': timeline.selectedEasingType() == option.type}"
            (click)="timeline.setSelectedEasing(option.type)"
            [title]="option.label">
      <fa-icon [icon]="option.icon" [ngClass]="option.className"></fa-icon>
    </button>
  </div>
</div>
