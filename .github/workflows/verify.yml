name: Verify

on:
  push:
  pull_request:

jobs:
  runtime-and-editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run verify
      - run: npm test -- --watch=false
      - run: npm run build
      - run: git diff --check
